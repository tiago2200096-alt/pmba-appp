<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMBA APP</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
button {
  margin:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:white;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>🔥 Projeto Assunção PMBA</h1>

<p id="status">XP: 0 | Nível: 1</p>

<button onclick="xp+=10;update()">+10 Questões</button>
<button onclick="xp+=50;update()">Fechar Dia</button>

<script>
let xp=0;

function update(){
  let level = Math.floor(xp/100)+1;
  document.getElementById("status").innerText =
  "XP: "+xp+" | Nível: "+level;
}
</script>

</body>
</html>
